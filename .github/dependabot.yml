version: 2
updates:
  # npm dependencies
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      # Batch low-risk dev/tooling bumps into a single PR to cut noise.
      dev-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch

  # GitHub Actions used by CI
  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: weekly
